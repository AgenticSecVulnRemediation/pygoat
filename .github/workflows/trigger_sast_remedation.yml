# =============================================================================
# Workflow: Trigger SAST Remediation Pipeline
# Description: Calls the AES execution API to initiate the Third-Party SAST
#              to RapidFix Remediation workflow.
# =============================================================================

name: Trigger SAST Remediation

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:

  # Automatic trigger on PR merge to master
  pull_request:
    types:
      - closed
    branches:
      - master

jobs:
  trigger-remediation:
    name: Call AES Execution API
    runs-on: ubuntu-latest

    # Only run on manual dispatch OR when a PR is actually merged (not just closed)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Call AES Execution API
      # -----------------------------------------------------------------------
      - name: Trigger SAST to RapidFix Remediation
        run: |
          curl -X POST "${{ secrets.DMS_BASE_URL }}/aes/executions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DMS_BEARER_TOKEN }}" \
            -d '{
              "usecase_id": 11843,
              "reference_id": "Third-Party SAST to RapidFix Remediation",
              "input": {
                "messages": [
                  {
                    "content": "Proceed with the following details and make sure to use the following parameters \nOwner: AgenticSecVulnRemediation\nrepo_name: pygoat\nbranch: master\nsast_tool: sonarqube\nappId: 4b188875-97b6-4bd1-8887-431fe6692805",
                    "role": "user"
                  }
                ]
              },
              "callback_url": "https://example.com/"
            }' \
            --fail-with-body
